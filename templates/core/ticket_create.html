{% extends 'base.html' %}

{% block title %}Nouvelle demande — BUMIGEB{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7">
        <div class="d-flex align-items-center mb-4">
            <a href="{% url 'ticket_list' %}" class="btn btn-sm btn-outline-secondary me-3">
                <i class="bi bi-arrow-left"></i>
            </a>
            <div>
                <h4 class="fw-bold mb-0">Nouvelle demande d'intervention</h4>
                <small class="text-muted">Décrivez votre problème avec le maximum de détails</small>
            </div>
        </div>

        <div class="card">
            <div class="card-body p-4">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label fw-bold">Titre <span class="text-danger">*</span></label>
                        <input type="text" name="title" class="form-control"
                               placeholder="Ex: Mon PC ne démarre plus" required>
                    </div>
                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Catégorie</label>
                            <select name="category" class="form-select">
                                <option value="hardware">Panne matérielle</option>
                                <option value="software">Logiciel</option>
                                <option value="network">Réseau</option>
                                <option value="printer">Imprimante</option>
                                <option value="other">Autre</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Priorité ressentie</label>
                            <select name="priority" class="form-select">
                                <option value="low">Basse</option>
                                <option value="normal" selected>Normale</option>
                                <option value="high">Haute</option>
                                <option value="critical">Critique</option>
                            </select>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Description <span class="text-danger">*</span></label>
                        <textarea name="description" class="form-control" rows="5"
                                  placeholder="Décrivez le problème en détail : depuis quand, ce que vous avez remarqué, ce que vous avez déjà essayé..." required></textarea>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-bold">Équipement concerné</label>
                        <select name="equipment" class="form-select">
                            <option value="">-- Sélectionner un équipement --</option>
                            {% for eq in equipments %}
                            <option value="{{ eq.id }}">{{ eq.name }} — {{ eq.serial_number }}</option>
                            {% endfor %}
                        </select>
                        <small class="text-muted">Laissez vide si vous ne savez pas</small>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn text-white py-2" style="background-color: #1e3a5f;">
                            <i class="bi bi-send"></i> Envoyer la demande
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
