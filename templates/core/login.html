{% extends 'base.html' %}

{% block title %}Connexion — BUMIGEB{% endblock %}

{% block auth_content %}
<div class="min-vh-100 d-flex align-items-center justify-content-center" style="background-color: #f8fafc;">
    <div class="card p-4" style="width: 400px;">
        <div class="text-center mb-4">
            <i class="bi bi-pc-display fs-1" style="color: #1e3a5f;"></i>
            <h5 class="mt-2 fw-bold" style="color: #1e3a5f;">BUMIGEB</h5>
            <small class="text-muted">Gestion du Parc Informatique</small>
        </div>
        {% if form.errors %}
        <div class="alert alert-danger">
            Email ou mot de passe incorrect.
        </div>
        {% endif %}
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label fw-500">Email</label>
                <input type="email" name="username" class="form-control" placeholder="votre@email.com" required autofocus>
            </div>
            <div class="mb-3">
                <label class="form-label">Mot de passe</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn w-100 text-white" style="background-color: #1e3a5f;">
                <i class="bi bi-box-arrow-in-right"></i> Se connecter
            </button>
        </form>
    </div>
</div>
{% endblock %}
